    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a365d">

    {% if page.excerpt %}
    <meta name="description" content="{{ page.excerpt | strip_html | truncatewords: 50 }}" />
    {% else %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}

    <meta name="author" content="{{ site.name }}" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
    <meta property="og:site_name" content="{{ site.name }}" />
    {% if page.title %}
    <meta property="og:title" content="{{ page.title }}" />
    {% else %}
    <meta property="og:title" content="{{ site.name }}" />
    {% endif %}
    {% if page.excerpt %}
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncatewords: 50 }}" />
    {% else %}
    <meta property="og:description" content="{{ site.description }}" />
    {% endif %}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    {% if page.title %}
    <meta name="twitter:title" content="{{ page.title }}" />
    {% endif %}
    {% if page.excerpt %}
    <meta name="twitter:description" content="{{ page.excerpt | strip_html | truncatewords: 50 }}" />
    {% else %}
    <meta name="twitter:description" content="{{ site.description }}" />
    {% endif %}
