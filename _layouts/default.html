<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="icon" href="{{ site.baseurl }}/favicon.ico" />
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <header class="site-header">
      <div class="header-inner">
        <a href="{{ site.baseurl }}/" class="site-title">{{ site.name }}</a>

        <div class="nav-right">
          <input type="checkbox" id="nav-toggle" class="nav-toggle-input" aria-hidden="true">

          <div class="nav-links">
            <a href="{{ site.baseurl }}/about">About</a>
            <a href="{{ site.baseurl }}/#posts">Blog</a>
            <a href="{{ site.baseurl }}/contact">Contact</a>
            <a href="{{ site.baseurl }}/Galvez_resume.pdf">CV</a>
          </div>

          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>

          <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
          </label>
        </div>
      </div>
    </header>

    <main id="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        {% include svg-icons.html %}
        <p class="footer-text">&copy; {{ site.time | date: '%Y' }} {{ site.name }}</p>
      </div>
    </footer>

    {% include analytics.html %}

    <script>
      // Dark mode toggle
      (function() {
        const toggle = document.getElementById('theme-toggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const stored = localStorage.getItem('theme');

        if (stored) {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (prefersDark) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }

        toggle.addEventListener('click', function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        });
      })();
    </script>
  </body>
</html>
